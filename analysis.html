<link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">
<div data-bp="1" style="width:85%;margin:18px auto;font-family:'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif">
<style>
[data-bp]{--abg:rgba(91,155,213,.08);--bbg:rgba(255,255,255,.80);--bd:rgba(150,200,240,.25);--ac:#5b9bd5;--txt:#6a8aaa;background:var(--bbg);border:1px solid var(--bd);border-radius:12px;box-shadow:0 0 20px rgba(91,155,213,.06)}
[data-bp].pk{--abg:rgba(232,135,168,.08);--bbg:rgba(255,255,255,.80);--bd:rgba(232,135,168,.22);--ac:#e887a8;--txt:#996677}
[data-bp].dk{--abg:rgba(139,124,240,.08);--bbg:rgba(30,30,50,.82);--bd:rgba(120,130,200,.20);--ac:#8b7cf0;--txt:#a0a0c0}
[data-bp] details summary{display:flex;align-items:center;gap:10px;padding:12px 22px;cursor:pointer;list-style:none;background:var(--abg);border-bottom:1px solid var(--bd);border-radius:12px 12px 0 0;font-size:13px;font-weight:500;color:var(--ac);letter-spacing:1px}
[data-bp][open] summary{border-radius:12px 12px 0 0}
[data-bp]:not([open]) summary{border-radius:12px}
[data-bp] details summary::-webkit-details-marker,[data-bp] details summary::marker{display:none}
[data-bp] .bp-body{padding:16px 22px;color:var(--txt);font-size:13px;line-height:1.75;font-family:'Cascadia Code','Fira Code','JetBrains Mono','Consolas','Microsoft YaHei',monospace;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto}
[data-bp] .bp-body::-webkit-scrollbar{width:5px}[data-bp] .bp-body::-webkit-scrollbar-thumb{background:var(--ac);border-radius:3px}
.th-dot{display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid var(--bd);cursor:pointer;margin-left:4px;transition:transform .2s;vertical-align:middle}
.th-dot:hover{transform:scale(1.15)}.th-dot.active{border-color:var(--ac)!important;box-shadow:0 0 6px var(--ac)}
</style>
<details>
<summary>
<span style="font-family:'Allura','Georgia',serif;font-size:24px;font-style:italic;background:linear-gradient(160deg,var(--ac),transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Analysis</span>
<span style="font-size:12px;color:var(--txt);letter-spacing:1px">— 变量更新分析</span>
<span style="margin-left:auto;display:flex;gap:4px;align-items:center">
<span class="th-dot" style="background:#5b9bd5" data-t="blue"></span>
<span class="th-dot" style="background:#e887a8" data-t="pink"></span>
<span class="th-dot" style="background:#8b7cf0" data-t="dark"></span>
</span>
</summary>
<div class="bp-body">$1</div>
</details>
<script>
(function(){function bpSet(k){localStorage.setItem('bp-theme',k);
document.querySelectorAll('[data-bp]').forEach(function(el){el.classList.remove('pk','dk');if(k==='pink')el.classList.add('pk');else if(k==='dark')el.classList.add('dk')});
document.querySelectorAll('.th-dot').forEach(function(d){d.classList.toggle('active',d.dataset.t===k)})}
bpSet(localStorage.getItem('bp-theme')||'blue');
document.querySelectorAll('.th-dot').forEach(function(b){b.addEventListener('click',function(){bpSet(this.dataset.t)})})})();
</script>
</div>
